id: utilities
name: "Utilities & Power"
sector: Public
detection_keywords:
  company: [utilities, power, electricity, "water utility", gas, "energy distribution",
            "national grid", "edf energy", "e.on", rwe, "engie", "enel", "iberdrola",
            "nextera energy", "duke energy", "southern company", "dominion energy",
            "american electric power", "exelon", "sempra", "pg&e", "con edison",
            "thames water", "severn trent", "united utilities", "pennon"]
  industry_hint: [utilities, "electric utility", "water utility", "gas utility",
                  "power generation", "power distribution", "transmission", "grid",
                  "renewable energy", "nuclear power", "hydro power"]
  designation: ["grid operations", "network engineer", "power systems engineer",
                "distribution engineer", "transmission engineer", "systems operator",
                "control engineer", "regulatory manager", "network planner"]

hierarchy:
  - layer: 0
    label: "Board / Non-Executive"
    canonical: ["Chairman", "Non-Executive Director", "Independent Director", "Board Member"]
    patterns: ["chairman", "non.?exec", "independent director", "board member"]
    abbreviations: {}

  - layer: 1
    label: "C-Suite"
    canonical: ["Chief Executive Officer", "Chief Financial Officer", "Chief Operating Officer",
                "Chief Technology Officer", "Chief Commercial Officer",
                "Chief Networks Officer", "President & CEO"]
    patterns: ["chief \\w+ officer", "\\bpresident\\b"]
    abbreviations:
      CEO: "Chief Executive Officer"
      COO: "Chief Operating Officer"
      CFO: "Chief Financial Officer"
      CTO: "Chief Technology Officer"
      CCO: "Chief Commercial Officer"

  - layer: 2
    label: "EVP / SVP / Managing Director"
    canonical: ["Executive Vice President", "Senior Vice President", "Managing Director",
                "Group Director", "EVP Networks", "SVP Operations"]
    patterns: ["executive vice president", "\\bevp\\b", "senior vice president", "\\bsvp\\b", "managing director"]
    abbreviations:
      EVP: "Executive Vice President"
      SVP: "Senior Vice President"
      MD: "Managing Director"

  - layer: 3
    label: "VP / Network Director"
    canonical: ["Vice President", "Network Director", "General Manager",
                "Regional Director", "VP Engineering", "VP Networks"]
    patterns: ["(?<!associate )(?<!assistant )vice president", "\\bvp\\b", "network director", "general manager"]
    abbreviations:
      VP: "Vice President"
      GM: "General Manager"

  - layer: 4
    label: "Senior Director"
    canonical: ["Senior Director", "Senior Network Director", "Area Director",
                "Principal Engineer", "Associate Director"]
    patterns: ["senior director", "area director", "principal engineer"]
    abbreviations: {}

  - layer: 5
    label: "Director / Head of"
    canonical: ["Director", "Head of Networks", "Head of Operations",
                "Head of Engineering", "Head of Distribution"]
    patterns: ["\\bdirector\\b", "head of \\w+"]
    abbreviations: {}

  - layer: 6
    label: "Senior Manager / Principal Engineer"
    canonical: ["Senior Manager", "Senior Network Manager", "Principal Power Engineer",
                "Senior Systems Engineer", "Senior Regulatory Manager"]
    patterns: ["senior manager", "principal.*engineer", "senior.*engineer"]
    abbreviations: {}

  - layer: 7
    label: "Manager / Systems Operator"
    canonical: ["Manager", "Network Manager", "Systems Operator", "Grid Controller",
                "Operations Manager", "Project Manager", "Field Operations Manager"]
    patterns: ["\\bmanager\\b", "systems operator", "grid controller"]
    abbreviations: {}

  - layer: 8
    label: "Senior Engineer / Senior Technician"
    canonical: ["Senior Power Engineer", "Senior Network Engineer",
                "Senior Distribution Engineer", "Senior Control Engineer",
                "Senior Systems Engineer", "Senior Field Engineer"]
    patterns: ["senior.*engineer", "senior.*technician"]
    abbreviations: {}

  - layer: 9
    label: "Engineer / Technician / Analyst"
    canonical: ["Power Engineer", "Network Engineer", "Distribution Engineer",
                "Control Engineer", "Systems Engineer", "Field Engineer",
                "Technician", "Analyst"]
    patterns: ["\\bengineer\\b", "\\btechnician\\b", "\\banalyst\\b"]
    abbreviations: {}

  - layer: 10
    label: "Graduate / Apprentice / Trainee"
    canonical: ["Graduate Engineer", "Apprentice", "Trainee", "Junior Engineer",
                "Graduate Technician", "Engineering Apprentice"]
    patterns: ["\\bgraduate\\b", "\\bapprentice\\b", "\\btrainee\\b", "\\bjunior\\b"]
    abbreviations: {}

departments:
  - primary: "Networks & Operations"
    keywords: [networks, operations, distribution, transmission, grid, "control room"]
    secondaries:
      - name: "Distribution"
        keywords: [distribution, "distribution network", "last mile", "low voltage"]
      - name: "Transmission"
        keywords: [transmission, "high voltage", "national grid", interconnector]
      - name: "Grid Control"
        keywords: ["grid control", "control room", "systems operator", dispatch]

  - primary: "Engineering"
    keywords: [engineering, "asset management", "capital projects", "network planning"]
    secondaries:
      - name: "Network Planning"
        keywords: ["network planning", "load forecasting", "capacity planning", "network design"]
      - name: "Capital Projects"
        keywords: ["capital projects", "project delivery", "major projects", "substation"]

  - primary: "Regulatory & Commercial"
    keywords: [regulatory, commercial, pricing, tariffs, "price control", "ofgem", "ofwat"]
    secondaries:
      - name: "Regulatory Affairs"
        keywords: [regulatory, "price control", "ofgem", "ofwat", submissions]
