        keywords: [mergers, acquisitions, "m&a", advisory, "corporate finance advisory",
                   "strategic advisory", "deal advisory"]
      - name: "Capital Markets"
        keywords: ["capital markets", dcm, ecm, syndication, "equity capital markets",
                   "debt capital markets", "bond", "issuance"]
      - name: "Equity Research"
        keywords: ["equity research", "equity analyst", "fixed income research",
                   "credit research", "sector research", "research analyst",
                   "investment analyst", "securities analyst"]
      - name: "Sales & Trading"
        keywords: [sales, trading, "market making", "flow trading", derivatives, equities,
                   "fixed income", "fx trading", "commodities trading"]

  - primary: "Risk Management"
    keywords: [risk, "risk management", credit, "credit risk", "market risk",
               "operational risk", "liquidity risk", compliance, "regulatory"]
    secondaries:
      - name: "Credit Risk"
        keywords: ["credit risk", "credit analysis", "credit quality", "credit officer",
