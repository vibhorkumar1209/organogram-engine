id: banking_finance
name: "Banking & Financial Services"
sector: Public
detection_keywords:
  company: [bank, banking, "financial services", "financial group", fintech,
            "asset management", "wealth management", "capital markets", securities,
            investments, "investment bank", "credit union", "building society",
            "financial corp", "bancorp", "fund management",
            jpmorgan, citigroup, "bank of america", hsbc, barclays, "wells fargo",
            "goldman sachs", "morgan stanley", "deutsche bank", bnp, "credit suisse",
            ubs, "standard chartered", "dbs bank", "charles schwab",
            "t. rowe price", fidelity, vanguard, blackrock, blackstone,
            mastercard, visa, fiserv, "american express", "comerica", "huntington",
            "td bank", "royal bank", "lloyds", "natwest", "santander", "ing"]
  industry_hint: [bank, banking, financial, fintech, lending, mortgage,
                  treasury, "capital markets", "asset management", "wealth management",
                  "investment management", "private equity", "hedge fund", "mutual fund",
                  "fixed income", equities, derivatives, payments, "financial technology"]
  designation: ["chief financial", "chief risk", "head of credit", "head of lending",
                "relationship manager", "branch manager", "credit analyst",
                "mortgage", "underwriter", "aml", "kyc", "portfolio manager",
                "fund manager", "investment analyst", "equity analyst",
                "fixed income", "derivatives", "quantitative", "quant"]

hierarchy:
  - layer: 0
    label: "Board of Directors"
    canonical:
      - "Chairman of the Board"
      - "Non-Executive Chairman"
      - "Non-Executive Director"
      - "Senior Independent Director"
      - "Independent Director"
      - "Board Member"
      - "Board Director"
      - "Trustee"
      - "Supervisory Board Member"
    patterns:
      - "non.?exec"
      - "\\bchairman\\b"
      - "\\bchairperson\\b"
      - "independent director"
      - "board member"
      - "supervisory board"
    abbreviations: []

  - layer: 1
    label: "C-Suite / Executive Management"
    canonical:
      - "Group Chief Executive Officer"
      - "Chief Executive Officer"
      - "Chief Financial Officer"
      - "Chief Operating Officer"
      - "Chief Technology Officer"
      - "Chief Information Officer"
      - "Chief Risk Officer"
      - "Chief Compliance Officer"
      - "Chief Digital Officer"
      - "Chief Data Officer"
      - "Chief Marketing Officer"
      - "Chief People Officer"
      - "Chief Human Resources Officer"
      - "Chief Commercial Officer"
      - "Chief Credit Officer"
      - "Chief Investment Officer"
      - "Chief Revenue Officer"
      - "Chief Legal Officer"
      - "Chief Transformation Officer"
      - "Chief Information Security Officer"
      - "Chief Analytics Officer"
      - "Chief Strategy Officer"
      - "Chief Sustainability Officer"
      - "Chief Product Officer"
      - "Chief Growth Officer"
      - "Chief Customer Officer"
      - "Chief Experience Officer"
      - "Group Managing Director"
      - "President"
    patterns:
      - "chief \\w+ officer"
      - "chief \\w+ \\w+ officer"
      - "group chief"
      - "group ceo"
      - "group md"
      - "group managing director"
    abbreviations:
      CEO: "Chief Executive Officer"
      CFO: "Chief Financial Officer"
      COO: "Chief Operating Officer"
      CTO: "Chief Technology Officer"
      CIO: "Chief Information Officer"
      CRO: "Chief Risk Officer"
      CCO: "Chief Compliance Officer"
      CDO: "Chief Digital Officer"
      CMO: "Chief Marketing Officer"
      CPO: "Chief People Officer"
      CHRO: "Chief Human Resources Officer"
      CLO: "Chief Legal Officer"

  - layer: 2
    label: "Executive Director / MD / EVP"
    canonical:
      - "Managing Director"
      - "Executive Director"
      - "Executive Vice President"
      - "Group Director"
      - "Group Head"
      - "Divisional CEO"
      - "Divisional Managing Director"
      - "Country CEO"
      - "Regional CEO"
    patterns:
      - "managing director"
      - "executive vice president"
      - "\\bevp\\b"
      - "\\bmd\\b"
      - "global head"
      - "group director"
      - "group head"
      - "divisional ceo"
    abbreviations:
      MD: "Managing Director"
      EVP: "Executive Vice President"

  - layer: 3
    label: "Vice President / Divisional Head"
    canonical:
      - "Vice President"
      - "Senior Vice President"
      - "Director General"
      - "General Manager"
      - "Divisional Director"
      - "Country Head"
      - "Regional Head"
      - "Business Head"
    patterns:
      - "(?<!associate )(?<!assistant )vice president"
      - "\\bsvp\\b"
      - "general manager"
      - "country head"
      - "regional head"
      - "business head"
      - "\\bvp\\b"
    abbreviations:
      VP: "Vice President"
      SVP: "Senior Vice President"

  - layer: 4
    label: "Senior Director / Head of Business"
    canonical:
      - "Senior Director"
      - "Head of Retail Banking"
      - "Head of Corporate Banking"
      - "Head of Treasury"
      - "Head of Compliance"
      - "Head of Risk"
      - "Regional Director"
      - "Area Director"
    patterns:
      - "senior director"
      - "head of \\w+"
      - "regional director"
      - "area director"
    abbreviations: []

  - layer: 5
    label: "Director / Head"
    canonical:
      - "Director"
      - "Head"
      - "Principal"
    patterns:
      - "\\bdirector\\b"
      - "\\bhead\\b"
      - "\\bprincipal\\b"
    abbreviations: []

  - layer: 6
    label: "Senior Manager / Associate Director"
    canonical:
      - "Senior Manager"
      - "Associate Director"
      - "Deputy Director"
    patterns:
      - "senior manager"
      - "associate director"
      - "deputy director"
    abbreviations: []

  - layer: 7
    label: "Manager / Team Lead"
    canonical:
      - "Manager"
      - "Team Lead"
      - "Team Leader"
      - "Branch Manager"
      - "Relationship Manager"
      - "Portfolio Manager"
    patterns:
      - "\\bmanager\\b"
      - "team lead"
      - "portfolio manager"
    abbreviations: []

  - layer: 8
    label: "Senior Analyst / Specialist"
    canonical:
      - "Senior Analyst"
      - "Senior Specialist"
      - "Senior Consultant"
      - "Senior Associate"
      - "Senior Officer"
    patterns:
      - "senior analyst"
      - "senior specialist"
      - "senior associate"
      - "senior officer"
    abbreviations: []

  - layer: 9
    label: "Analyst / Associate / Officer"
    canonical:
      - "Analyst"
      - "Associate"
      - "Officer"
      - "Consultant"
      - "Specialist"
      - "Executive"
    patterns:
      - "\\banalyst\\b"
      - "\\bassociate\\b"
      - "\\bofficer\\b"
      - "\\bconsultant\\b"
    abbreviations: []

  - layer: 10
    label: "Graduate / Intern / Entry"
    canonical:
      - "Graduate"
      - "Graduate Analyst"
      - "Graduate Trainee"
      - "Intern"
      - "Trainee"
      - "Junior"
      - "Apprentice"
    patterns:
      - "\\bgraduate\\b"
      - "\\bintern\\b"
      - "\\btrainee\\b"
      - "\\bjunior\\b"
      - "\\bapprentice\\b"
    abbreviations: []

departments:
  - primary: "Executive Leadership"
    keywords: [board, "non-executive", "independent director", chairman, trustee,
               "board of directors", "supervisory board", "audit committee",
               "remuneration committee", "nominations committee", "risk committee"]
    secondaries:
      - name: "Board of Directors"
        keywords: [board, chairman, "non-executive director", "independent director",
                   "senior independent director", trustee]
      - name: "Executive Committee"
        keywords: ["executive committee", exco, "group executive committee", "exco member",
                   "managing director", "executive director", "group head"]
      - name: "Audit & Risk Committee"
        keywords: ["audit committee", "risk committee", "nominations committee",
                   "remuneration committee"]

  - primary: "Retail Banking"
    keywords: [retail, "retail banking", branch, "personal banking", "consumer banking",
               mortgage, "home loan", "current account", savings, deposit, "credit card"]
    secondaries:
      - name: "Branch Network"
        keywords: [branch, "branch manager", "branch banking", "retail banking", "personal banking"]
      - name: "Mortgages & Lending"
        keywords: [mortgage, "home loan", lending, "secured lending", "residential mortgage"]
      - name: "Consumer Lending"
        keywords: ["personal loan", "consumer lending", unsecured, "credit card", instalment, overdraft]
      - name: "Deposits & Savings"
        keywords: [deposit, savings, "current account", "savings account", "fixed deposit"]
      - name: "Digital & Mobile Banking"
        keywords: ["digital banking", "mobile banking", "app banking", "online banking",
                   "digital channels", "open banking"]

  - primary: "Commercial Banking"
    keywords: ["commercial banking", sme, "business banking", "corporate banking",
               "transaction banking", "cash management", trade, "trade finance",
               "commercial lending", "corporate lending"]
    secondaries:
      - name: "SME Banking"
        keywords: [sme, "small business", "business banking", "commercial banking", "mid-market"]
      - name: "Corporate Banking"
        keywords: ["corporate banking", "corporate finance", "transaction banking",
                   "cash management", "large corporates", "multinational"]
      - name: "Trade Finance"
        keywords: ["trade finance", trade, "supply chain finance", "export finance",
                   "import finance", "letters of credit", "documentary credits"]
      - name: "Treasury & Markets"
        keywords: [treasury, liquidity, "balance sheet", "interest rate risk",
                   funding, "fx", "foreign exchange", "money markets"]

  - primary: "Investment Banking"
    keywords: ["investment banking", "capital markets", "mergers and acquisitions",
