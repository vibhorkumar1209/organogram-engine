id: education
name: "Education & EdTech"
sector: Public
detection_keywords:
  company: [university, "university of", "national university", "polytechnic",
            college, institute, school, "pearson education", "mcgraw hill", "cengage",
            "coursera", "edx", "udemy", "byju's", byjus, "unacademy", "vedantu",
            "chegg", "duolingo", "2u", "kaplan", "berlitz", "british council",
            "times higher education", "cambridge university press"]
  industry_hint: [education, "higher education", "tertiary education", "school education",
                  "k-12", edtech, "e-learning", "online learning", "vocational training",
                  "professional development", university, college, academy, "learning & development"]
  designation: ["professor", "lecturer", "dean", "principal", "provost", "rector",
                "registrar", "academic director", "curriculum developer",
                "faculty", "instructor", "trainer"]

hierarchy:
  - layer: 0
    label: "Board / Chancellor / Trustees"
    canonical:
      - "Chancellor"
      - "Board Member"
      - "Trustee"
      - "Governor"
      - "Chairman of Board"
      - "Pro-Chancellor"
    patterns: ["\\bchancellor\\b(?! vice)", "\\btrustee\\b", "\\bgovernor\\b(?! deputy)",
               "board member", "pro.?chancellor"]
    abbreviations: {}

  - layer: 1
    label: "Vice-Chancellor / President / CEO"
    canonical:
      - "Vice-Chancellor"
      - "President"
      - "Chief Executive Officer"
      - "CEO"
      - "Rector"
      - "Provost"
      - "Principal"
    patterns: ["vice.?chancellor", "\\bprovost\\b", "\\brector\\b",
               "\\bprincipal\\b(?! deputy)(?! vice)",
               "\\bpresident\\b(?! vice)", "chief executive", "\\bceo\\b"]
    abbreviations:
      VC: "Vice-Chancellor"
      CEO: "Chief Executive Officer"

  - layer: 2
    label: "Deputy Vice-Chancellor / EVP / Provost"
    canonical:
      - "Deputy Vice-Chancellor"
      - "DVC"
      - "Pro Vice-Chancellor"
      - "Senior Vice President"
      - "SVP"
      - "Executive Vice President"
      - "EVP"
    patterns: ["deputy vice.?chancellor", "\\bdvc\\b", "pro vice.?chancellor",
               "senior vice president", "\\bsvp\\b",
               "executive vice president", "\\bevp\\b"]
    abbreviations:
      DVC: "Deputy Vice-Chancellor"
      SVP: "Senior Vice President"
      EVP: "Executive Vice President"

  - layer: 3
    label: "Dean / Vice President"
    canonical:
      - "Dean"
      - "Vice President"
      - "VP"
      - "Executive Dean"
    patterns: ["\\bdean\\b(?! associate)(?! assistant)", "executive dean",
               "(?<!associate )(?<!assistant )vice president",
               "(?<!associate )(?<!assistant )\\bvp\\b"]
    abbreviations:
      VP: "Vice President"

  - layer: 4
    label: "Associate Dean / Senior Director"
    canonical:
      - "Associate Dean"
      - "Assistant Dean"
      - "Senior Director"
      - "Associate Vice President"
      - "AVP"
      - "Head of School"
      - "Head of Department"
    patterns: ["associate dean", "assistant dean", "senior director",
               "associate vice president", "\\bavp\\b",
               "head of school", "head of department"]
    abbreviations:
      AVP: "Associate Vice President"

  - layer: 5
    label: "Director / Professor"
    canonical:
      - "Director"
      - "Professor"
      - "Associate Professor"
      - "Associate Director"
      - "Department Chair"
      - "Programme Director"
    patterns: ["\\bdirector\\b", "\\bprofessor\\b(?! assistant)(?! associate)",
               "associate professor", "associate director",
               "department chair", "programme director"]
    abbreviations: {}

  - layer: 6
    label: "Senior Manager / Senior Lecturer / Assistant Professor"
    canonical:
      - "Senior Manager"
      - "Senior Lecturer"
      - "Assistant Professor"
      - "Reader"
      - "Principal Lecturer"
    patterns: ["senior manager", "senior lecturer", "assistant professor",
               "\\breader\\b", "principal lecturer"]
    abbreviations: {}

  - layer: 7
    label: "Manager / Lecturer / Course Director"
    canonical:
      - "Manager"
      - "Lecturer"
      - "Course Director"
      - "Academic Lead"
      - "Programme Manager"
      - "Registrar"
      - "Academic Manager"
    patterns: ["\\bmanager\\b", "\\blecturer\\b(?! senior)(?! principal)",
               "course director", "academic lead", "programme manager", "\\bregistrar\\b"]
    abbreviations: {}

  - layer: 8
    label: "Senior Tutor / Senior Coordinator / Research Fellow"
    canonical:
      - "Senior Tutor"
      - "Senior Coordinator"
      - "Research Fellow"
      - "Senior Research Associate"
      - "Instructor"
    patterns: ["senior tutor", "senior coordinator", "research fellow",
               "senior research associate", "\\binstructor\\b"]
    abbreviations: {}

  - layer: 9
    label: "Tutor / Coordinator / Research Associate"
    canonical:
      - "Tutor"
      - "Coordinator"
      - "Research Associate"
      - "Teaching Assistant"
      - "Academic Advisor"
      - "Analyst"
    patterns: ["\\btutor\\b(?! senior)", "\\bcoordinator\\b(?! senior)",
               "research associate(?! senior)", "teaching assistant", "academic advisor",
               "\\banalyst\\b"]
    abbreviations:
      TA: "Teaching Assistant"

  - layer: 10
    label: "Intern / Graduate Research Assistant / Work Placement"
    canonical:
      - "Intern"
      - "Graduate Research Assistant"
      - "Work Placement Student"
      - "PhD Student"
      - "Research Student"
      - "Trainee"
    patterns: ["\\bintern\\b", "graduate research assistant", "work placement",
               "phd student", "research student", "\\btrainee\\b"]
    abbreviations: {}

departments:
  - primary: "Academic / Faculty"
    keywords: [academic, faculty, teaching, research, "academic programmes",
               "learning & teaching"]
    secondaries:
      - name: "Faculties & Schools"
        keywords: [faculty, school, "academic department", "discipline", "college of"]
      - name: "Research & Innovation"
        keywords: [research, innovation, "research centres", "knowledge transfer",
                   "research grants"]

  - primary: "Student Services"
    keywords: ["student services", "student experience", "admissions", "student affairs",
               "student support", registry]
    secondaries:
      - name: "Admissions & Enrolment"
        keywords: [admissions, enrolment, "student recruitment", "international admissions"]
      - name: "Student Support & Wellbeing"
        keywords: ["student support", wellbeing, "student counselling", "disability support",
                   "careers service"]

  - primary: "Operations & Administration"
    keywords: [operations, administration, finance, hr, "human resources", facilities]
    secondaries:
      - name: "Finance & Planning"
        keywords: [finance, "financial planning", "budgeting", "grants management"]
      - name: "HR & People"
        keywords: [hr, "human resources", "people", "talent management", payroll]

  - primary: "Digital & Library"
    keywords: [digital, library, "it services", "learning technology", "digital learning",
               "e-learning", edtech]
    secondaries:
      - name: "Library & Learning Resources"
        keywords: [library, "learning resources", "learning commons", "information services"]
      - name: "IT & Digital Learning"
        keywords: ["it services", "digital learning", "learning management system",
                   lms, "educational technology"]
